services:
  cloud-store:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: store-dev:latest
    container_name: cloud-store
    ports:
      - "8000:80"
    volumes:
      - .:/app
    env_file:
      - .env
    restart: always
    networks:
      - core

networks:
  core:
    external: true
